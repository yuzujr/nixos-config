[bar]
order = [ "default" ]

    [bar.default]
    margin_edge = 10
    margin_ends = 10
    radius = 20
    background_opacity = 0.93000000715255737
    capsule = true
    end = [ "screen_recorder", "tray", "network", "bluetooth", "notifications", "volume", "brightness", "battery", "control-center" ]
    shadow = true
    thickness = 40
    start = [ "workspaces", "active_window", "media" ]

[brightness]
enable_ddcutil = true

[desktop_widgets]
enabled = false

[idle]
pre_action_fade_seconds = 5
behavior_order = [ "lock", "screen-off", "suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660

    [idle.behavior.suspend]
    action = "suspend"
    enabled = false
    lock_before_suspend = true
    timeout = 900

[shell]
avatar_path = "/home/yuzujr/Pictures/Beluga.webp"
font_family = "Noto Sans CJK SC"
polkit_agent = true
settings_show_advanced = false
clipboard_auto_paste = "off"
    
    [shell.panel]
    clipboard_placement = "attached"
    open_near_click_control_center = true
    
    [shell.shadow]
    blur = 12

[system.monitor]
enabled = false

[theme]
builtin = "Rosé Pine"
mode = "light"
source = "builtin"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4", "kcolorscheme", "kitty", "niri", "qt" ]
    community_ids = [ "fuzzel", "yazi" ]

[wallpaper]
directory = "/home/yuzujr/Pictures/Wallpapers"

    [wallpaper.default]
    path = "/home/yuzujr/Pictures/Wallpapers/7.png"

    [wallpaper.last]
    path = "/home/yuzujr/Pictures/Wallpapers/7.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/yuzujr/Pictures/Wallpapers/7.png"

[weather]
enabled = true
auto_locate = false
address = "Changchun, CN"

[widget.workspaces]
display = "none"
empty_color = "on_surface"
occupied_color = "on_surface"

[widget.active_window]
icon_size = 18.0
min_length = 0.0
max_length = 200.0
title_scroll = "on_hover"

[widget.media]
title_scroll = "on_hover"

[widget.tray]
drawer = true

[widget.brightness]
show_label = false

[widget.network]
show_label = false

[widget.screen_recorder]
type = "scripted"
script = "scripts/screen_recorder.lua"
directory        = ""
filename_pattern = "recording_%Y%m%d_%H%M%S"
video_source     = "portal"
video_codec      = "h264"
audio_codec      = "opus"
audio_source     = "default_output"
quality          = "very_high"
frame_rate       = 60
color_range      = "limited"
resolution       = "original"
show_cursor      = true
copy_to_clipboard = false
restore_portal   = false
replay_enabled   = false
replay_duration  = 30
replay_storage   = "ram"
hide_inactive    = false

[widget.volume]
show_label = false

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "power_profile"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "dark_mode"

[backdrop]
enabled = true
