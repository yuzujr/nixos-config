"$schema" = "https://starship.rs/config-schema.json"

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 4
style = "bold blue"

[character]
success_symbol = "[[‚ĚĮ](green)](yellow)"
error_symbol   = "[[‚ĚĮ](red)](yellow)"
vimcmd_symbol  = "[‚Ěģ](cyan)"

[git_branch]
style = "bold magenta"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](cyan) ($ahead_behind$stashed)]($style)"
style = "blue"
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

