# Gold watcher config
# API endpoint should return JSON with a numeric .price field (USD/oz).
API_URL="https://api.gold-api.com/price/XAU"

# Polling interval in seconds (used when running with --loop).
CHECK_INTERVAL=300

# Absolute thresholds in USD/oz. Leave empty to disable.
ABS_HIGH="5200"
ABS_LOW="5100"

# Relative change threshold in percent from the internal anchor.
# Example: 0.8 means alert when move is >= 0.8% up or down.
REL_CHANGE_PCT="1"

# Notification title.
NOTIFY_TITLE="Gold Price Alert"

# Write per-sample watcher CSV.
# File path: $WATCH_CSV_DIR/YYYY-MM-DD.csv
# Symlink:   $WATCH_CSV_DIR/today.csv
WATCH_CSV_ENABLED=1
WATCH_CSV_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/gold-price-history"
